<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Викторина</h1>
        <div class="toggle-section">
            <button id="showQuizBtn" class="toggle-btn">Показать вопросы</button>
        </div>
        <div id="quizList" class="quiz-grid hidden"></div>
        <div class="submit-section">
            <button id="submitBtn" class="submit-btn">Проверить ответы</button>
        </div>
        <div id="result" class="result"></div>
        <footer>Выберите ответы и нажмите "Проверить"</footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
