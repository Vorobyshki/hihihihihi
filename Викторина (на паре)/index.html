<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Викторина</h1>
            <div class="stats">
                <span id="questionCounter">Вопрос 0 / 0</span>
                <span id="scoreDisplay">Счёт: 0</span>
            </div>
        </header>

        <main>
            <div id="loadingScreen" class="screen active">
                <div class="spinner"></div>
                <p>Загрузка вопросов...</p>
            </div>

            <div id="quizScreen" class="screen">
                <div class="question-card">
                    <div class="category" id="category">---</div>
                    <div class="question" id="questionText">---</div>
                    <div class="answers" id="answersContainer"></div>
                    <button id="nextBtn" class="btn-next" disabled>Следующий вопрос</button>
                </div>
            </div>

            <div id="resultScreen" class="screen">
                <div class="result-card">
                    <h2>Викторина завершена</h2>
                    <div class="final-score" id="finalScore">0 / 0</div>
                    <div id="resultMessage" class="result-message"></div>
                    <button id="restartBtn" class="btn-restart">Начать заново</button>
                    <button id="clearBtn" class="btn-clear">Очистить прогресс</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
